name: Sanity Catalog Sync

on:
  workflow_run:
    workflows: ["Airalo Package Sync"]
    types:
      - completed

jobs:
  sanity_sync:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show commit
        run: git log -1 --oneline

      - name: Sync catalog to Sanity
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_READ_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
          SANITY_API_VERSION: ${{ secrets.SANITY_API_VERSION }}
        run: npx tsx scripts/sync-catalog-to-sanity.ts
